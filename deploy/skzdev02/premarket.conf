# Pre-Market Dashboard — nginx site.
# Install as /etc/nginx/sites-available/premarket and symlink into sites-enabled.
# Listens on port 3000 (verified free on skzdev02); does not touch other sites.

upstream premarket_backend {
    server 127.0.0.1:8000;
}

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    # Frontend static build
    root /opt/premarket/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (FastAPI on 127.0.0.1:8000)
    location /api {
        proxy_pass http://premarket_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Dashboard polls every 10–30s; keep proxy timeouts comfortable.
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location /health {
        proxy_pass http://premarket_backend;
    }
}
